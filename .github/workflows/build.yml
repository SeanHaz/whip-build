name: Build gst-plugin-webrtc for ARMv7

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Configure armhf repos and install dependencies
        run: |
          sudo dpkg --add-architecture armhf

          # Completely replace sources to avoid armhf hitting wrong repos
          sudo rm -f /etc/apt/sources.list
          sudo rm -f /etc/apt/sources.list.d/*.list

          # amd64 only from archive
          echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble main restricted universe multiverse" | sudo tee /etc/apt/sources.list
          echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list

          # armhf from ports
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list

          sudo apt update
          sudo apt install -y \
            gcc-arm-linux-gnueabihf \
            pkg-config \
            libgstreamer1.0-dev:armhf \
            libgstreamer-plugins-bad1.0-dev:armhf \
            libssl-dev:armhf \
            libc6-dev-armhf-cross

      - name: Install Rust nightly + ARMv7 target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          source ~/.cargo/env
          rustup target add armv7-unknown-linux-gnueabihf

      - name: Configure cross-compilation
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF

      - name: Install cargo-c
        run: |
          source ~/.cargo/env
          cargo install cargo-c

      - name: Clone gst-plugins-rs
        run: |
          git clone https://gitlab.freedesktop.org/gstreamer/gst-plugins-rs.git
          cd gst-plugins-rs
          git log --oneline -1

      - name: Build gst-plugin-webrtc
        run: |
          source ~/.cargo/env
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
          export CARGO_PROFILE_RELEASE_LTO=off
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16
          cd gst-plugins-rs
          cargo cbuild -p gst-plugin-webrtc \
            --target armv7-unknown-linux-gnueabihf \
            --prefix=/usr

      - name: Install to output directory
        run: |
          source ~/.cargo/env
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
          cd gst-plugins-rs
          cargo cinstall -p gst-plugin-webrtc \
            --target armv7-unknown-linux-gnueabihf \
            --prefix=/usr \
            --destdir=${{ github.workspace }}/output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gst-plugin-webrtc-armv7
          path: output/
          retention-days: 7
